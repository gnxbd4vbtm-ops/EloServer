<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft ELO Leaderboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: #0b0b0b;
    color: #eee;
    font-family: "Segoe UI", sans-serif;
    display: flex;
    justify-content: center;
}

.container {
    width: 95%;
    max-width: 1200px;
    text-align: center;
}

h1 {
    color: gold;
    margin: 30px 0 10px;
}

input {
    padding: 10px;
    width: 260px;
    border-radius: 6px;
    border: none;
    background: #1a1a1a;
    color: white;
    margin: 20px 0;
}

.tabs {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.tab-button {
    padding: 10px 20px;
    margin: 5px;
    background: #1e1e1e;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    color: gold;
    font-weight: bold;
}

.tab-button.active {
    background: gold;
    color: #0b0b0b;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: #121212;
    margin-bottom: 40px;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #2a2a2a;
    text-align: center;
}

th {
    background: #1e1e1e;
    color: gold;
}



.rank-cell {
    font-weight: bold;
}

.glow {
    animation: glow 1.5s infinite alternate;
    color: gold;
}

@keyframes glow {
    from { text-shadow: 0 0 5px gold; }
    to { text-shadow: 0 0 15px gold; }
}

.top3 {
    background: linear-gradient(to right, #FFD700, #FFAA00, #FF5500);
    animation: animateTop3 2s infinite alternate;
}

@keyframes animateTop3 {
    0% { background-position: left; }
    100% { background-position: right; }
}

@media (max-width: 768px) {
    table, th, td {
        font-size: 12px;
    }
    input {
        width: 90%;
    }
    .tabs {
        flex-direction: column;
    }
}
</style>
</head>

<body>
<div class="container">

<h1>Minecraft ELO Leaderboard</h1>

<input id="search" placeholder="Search IGN..." onkeyup="filterRows()">

<div class="tabs">
    <button class="tab-button active" data-mode="overall">Overall</button>
    <button class="tab-button" data-mode="mace">Mace</button>
    <button class="tab-button" data-mode="vanilla">Vanilla</button>
</div>

<table id="leaderboard-table">
<thead>
<tr>
    <th>#</th>
    <th>IGN</th>
    <th>ELO</th>
    <th>Rank</th>
    <th>Cat</th>
    <th>Last Updated</th>
</tr>
</thead>
<tbody>
<!-- Rows will be populated via JS -->
</tbody>
</table>

</div>

<script>
const tableBody = document.querySelector("#leaderboard-table tbody");
const searchInput = document.getElementById("search");
const tabs = document.querySelectorAll(".tab-button");

// Fetch leaderboard for a given mode
function fetchLeaderboard(mode) {
    fetch(`/api/v1/leaderboard/${mode}/`)
    .then(res => res.json())
    .then(data => {
        const players = data[mode];
        tableBody.innerHTML = "";

        players.forEach((p, i) => {
            const row = document.createElement("tr");

            if(i < 3) row.classList.add("top3");

            row.innerHTML = `
                <td>${i+1}</td>
                <td>${p.ign}</td>
                <td class="${p.elo >= 2000 ? 'glow' : ''}">${p.elo}</td>
                <td class="rank-cell">${p.rank}</td>
                <td>${p.cat}</td>
                <td>${new Date(p.last_updated).toLocaleString()}</td>
            `;
            tableBody.appendChild(row);
        });

        filterRows(); // apply search filter after populating
    })
    .catch(err => {
        console.error("Error fetching leaderboard:", err);
        tableBody.innerHTML = "<tr><td colspan='6'>Failed to load data.</td></tr>";
    });
}

// Search/filter function
function filterRows() {
    const val = searchInput.value.toLowerCase();
    tableBody.querySelectorAll("tr").forEach(row => {
        const ign = row.cells[1].textContent.toLowerCase();
        row.style.display = ign.includes(val) ? "" : "none";
    });
}

// Tab switching
tabs.forEach(tab => {
    tab.addEventListener("click", () => {
        tabs.forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        fetchLeaderboard(tab.dataset.mode);
        searchInput.value = "";
    });
});

// Default load
fetchLeaderboard("overall");
</script>

</body>
</html>
